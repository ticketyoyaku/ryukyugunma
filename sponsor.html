<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPONSOR | 第3回 琉球の風〜沖縄祭りIN高崎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  .sponsor-tier-title { font-family:"Bebas Neue",sans-serif; font-size:26px; letter-spacing:5px; margin:28px 0 16px; padding-bottom:8px; border-bottom:2px solid; }
  .sponsor-tier-title.GOLD   { color:#b8842a; border-color:#b8842a; }
  .sponsor-tier-title.SILVER { color:#7a8a9a; border-color:#7a8a9a; }
  .sponsor-tier-title.BRONZE { color:#8a5a3a; border-color:#8a5a3a; }
  .sponsor-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
  .sponsor-card { background:rgba(255,255,255,.75); backdrop-filter:blur(6px); border-radius:10px; padding:20px; text-align:center; border:1.5px solid rgba(200,150,58,.15); transition:transform .2s,box-shadow .2s; text-decoration:none; color:#1a2a1a; }
  .sponsor-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,.1); }
  .sponsor-logo { width:100px; height:64px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; background:rgba(250,246,238,.8); border-radius:6px; font-size:32px; }
  .sponsor-logo img { max-width:100%; max-height:100%; object-fit:contain; }
  .sponsor-name { font-size:13px; font-weight:700; }
</style>
</head>
<body class="subpage">

<header id="site-header"></header>
<div id="mobile-menu"></div>

<div class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-title-en">SPONSOR</h1>
    <p class="page-title-ja"> \ 協賛　/</p>
  </div>
</div>


<section class="glass-section">
  <div class="container">
    <p class="section-label reveal">Sponsor</p>
    <h2 class="section-title reveal"><em>スポンサー</em></h2>
    <div class="reveal" id="sponsor-wrap" style="margin-top:36px;"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<button id="back-to-top" title="ページトップへ">↑</button>

<script src="../js/data.js"></script>
<script src="../js/common.js"></script>
<script>document.addEventListener('DOMContentLoaded', function() {
  var sw = document.getElementById('sponsor-wrap');
  var sponsors = SITE_DATA.sponsors || [];
  if (sw) {
    if (sponsors.length) {
      var tiers = ['GOLD','SILVER','BRONZE'];
      sw.innerHTML = tiers.map(function(tier) {
        var list = sponsors.filter(function(s){return s.tier===tier;});
        if (!list.length) return '';
        return '<div class="sponsor-tier-title '+tier+'">'+tier+' SPONSOR</div>'+
          '<div class="sponsor-grid">'+list.map(function(s) {
            return '<a href="'+(s.url||'#')+'" target="_blank" class="sponsor-card">'+
              '<div class="sponsor-logo">'+(s.logo?'<img src="../'+s.logo+'" alt="'+s.name+'">':'🤝')+'</div>'+
              '<div class="sponsor-name">'+s.name+'</div></a>';
          }).join('')+'</div>';
      }).join('');
    } else {
      sw.innerHTML = '<div class="coming-soon"><span class="coming-soon-icon">🤝</span><h3>COMING SOON</h3><p>スポンサー情報は決まり次第公開します。</p></div>';
    }
  }
});</script>
</body>
</html>
