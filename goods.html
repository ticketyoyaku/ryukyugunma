<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOODS | 第3回 琉球の風〜沖縄祭りIN高崎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  .goods-card { background:rgba(255,255,255,.75); backdrop-filter:blur(6px); border-radius:10px; overflow:hidden; border:1.5px solid rgba(200,150,58,.2); transition:transform .3s,box-shadow .3s; text-decoration:none; color:#1a2a1a; }
  .goods-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(200,150,58,.15); }
  .goods-thumb { aspect-ratio:1/1; overflow:hidden; background:linear-gradient(135deg,#ffd166,#ff8e53); display:flex;align-items:center;justify-content:center;font-size:44px; }
  .goods-thumb img { width:100%;height:100%;object-fit:cover; }
  .goods-body { padding:14px; }
  .goods-name  { font-size:14px;font-weight:700;color:#1a2a1a;margin-bottom:4px; }
  .goods-price { font-family:'Bebas Neue',sans-serif;font-size:22px;color:#e8452a;margin-bottom:4px; }
  .goods-tag   { display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 9px;border-radius:3px;background:rgba(200,150,58,.15);color:#a87828; }
  @media(max-width:600px){#goods-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body class="subpage">

<header id="site-header"></header>
<div id="mobile-menu"></div>

<div class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-title-en">GOODS</h1>
    <p class="page-title-ja"> \ 公式グッズ /</p>
  </div>
</div>


<section class="glass-section">
  <div class="container">
    <p class="section-label reveal">Goods</p>
    <h2 class="section-title reveal">公式<em>グッズ</em></h2>
    <div class="reveal" id="goods-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px;"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<button id="back-to-top" title="ページトップへ">↑</button>

<script src="../js/data.js"></script>
<script src="../js/common.js"></script>
<script>document.addEventListener('DOMContentLoaded', function() {
  var gg = document.getElementById('goods-grid');
  var goods = SITE_DATA.goods || [];
  if (gg) {
    gg.innerHTML = goods.length ? goods.map(function(g) {
      var inner = '<div class="goods-thumb">'+(g.photo?'<img src="../'+g.photo+'" alt="'+g.name+'">':'<span>'+g.emoji+'</span>')+'</div>'+
        '<div class="goods-body"><div class="goods-name">'+g.name+'</div><div class="goods-price">¥'+g.price+'</div><span class="goods-tag">'+g.tag+'</span></div>';
      return g.url ? '<a href="'+g.url+'" target="_blank" rel="noopener" class="goods-card">'+inner+'</a>' : '<div class="goods-card">'+inner+'</div>';
    }).join('') :
    '<div class="coming-soon" style="grid-column:1/-1"><span class="coming-soon-icon">👕</span><h3>COMING SOON</h3><p>グッズ情報は決まり次第公開します。</p></div>';
  }
});</script>
</body>
</html>
