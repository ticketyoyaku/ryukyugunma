<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOOD | 第3回 琉球の風〜沖縄祭りIN高崎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  .food-card { background:rgba(255,255,255,.75); backdrop-filter:blur(6px); border-radius:10px; overflow:hidden; border:1.5px solid rgba(200,150,58,.15); transition:transform .3s,box-shadow .3s; text-decoration:none; color:#1a2a1a; }
  .food-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
  .food-thumb { aspect-ratio:4/3; overflow:hidden; background:linear-gradient(135deg,#06d6a0,#0096c7); display:flex;align-items:center;justify-content:center;font-size:44px; }
  .food-thumb img { width:100%;height:100%;object-fit:cover; }
  .food-body { padding:14px; }
  .food-name { font-size:14px;font-weight:700;color:#1a2a1a;margin-bottom:4px; }
  .food-desc { font-size:11px;color:#666;line-height:1.6; }
  .food-tag  { display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 9px;border-radius:3px;background:rgba(13,197,217,.15);color:#0099b0;margin-top:6px; }
  @media(max-width:600px){#food-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body class="subpage">

<header id="site-header"></header>
<div id="mobile-menu"></div>

<div class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-title-en">FOOD</h1>
    <p class="page-title-ja"> \ 出店情報 /</p>
  </div>
</div>


<section class="glass-section">
  <div class="container">
    <p class="section-label reveal">Food</p>
    <h2 class="section-title reveal">飲食・<em>出店</em></h2>
    <div class="reveal" id="food-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px;"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<button id="back-to-top" title="ページトップへ">↑</button>

<script src="../js/data.js"></script>
<script src="../js/common.js"></script>
<script>document.addEventListener('DOMContentLoaded', function() {
  var fg = document.getElementById('food-grid');
  var foods = SITE_DATA.foodVendors || [];
  if (fg) {
    fg.innerHTML = foods.length ? foods.map(function(v) {
      var inner = '<div class="food-thumb">'+(v.photo?'<img src="../'+v.photo+'" alt="'+v.name+'">':'<span>'+v.emoji+'</span>')+'</div>'+
        '<div class="food-body"><div class="food-name">'+v.name+'</div><div class="food-desc">'+v.desc+'</div><span class="food-tag">'+v.tag+'</span></div>';
      return v.url ? '<a href="'+v.url+'" target="_blank" rel="noopener" class="food-card">'+inner+'</a>' : '<div class="food-card">'+inner+'</div>';
    }).join('') :
    '<div class="coming-soon" style="grid-column:1/-1"><span class="coming-soon-icon">🥢</span><h3>COMING SOON</h3><p>出店情報は決まり次第公開します。</p></div>';
  }
});</script>
</body>
</html>
