<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWS | 第3回 琉球の風〜沖縄祭りIN高崎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  
</head>
<body class="subpage">

<header id="site-header"></header>
<div id="mobile-menu"></div>

<div class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-title-en">NEWS</h1>
    <p class="page-title-ja"> \ 新着情報 /</p>
  </div>
</div>


<section class="glass-section">
  <div class="container">
    <div class="reveal">
      <div class="news-section-title">NEWS <span>— 新着情報 —</span></div>
      <div class="news-divider"></div>
    </div>
    <div class="news-list reveal" id="news-list-all"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<button id="back-to-top" title="ページトップへ">↑</button>

<script src="../js/data.js"></script>
<script src="../js/common.js"></script>
<script>document.addEventListener('DOMContentLoaded', function() {
  var nl = document.getElementById('news-list-all');
  var news = SITE_DATA.news || [];
  if (nl) {
    nl.innerHTML = news.map(function(n) {
      return '<a href="'+(n.link||'#')+'" class="news-item">'+
        '<span class="news-date">'+n.date+'</span>'+
        '<span class="news-badge '+(n.badge==='INFO'?'INFO':n.badge==='UPDATE'?'UPDATE':'')+'">'+n.badge+'</span>'+
        '<div><p class="news-title">'+n.title+'</p>'+(n.body?'<p class="news-body">'+n.body+'</p>':'')+'</div></a>';
    }).join('') || '<p style="padding:32px 0;color:#888;text-align:center;">ニュースはまだありません</p>';
  }
});</script>
</body>
</html>
