<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOP | 第3回 琉球の風〜沖縄祭りIN高崎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  .shop-card { background:rgba(255,255,255,.75); backdrop-filter:blur(6px); border-radius:10px; overflow:hidden; border:1.5px solid rgba(200,150,58,.15); transition:transform .3s,box-shadow .3s; text-decoration:none; color:#1a2a1a; }
  .shop-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
  .shop-thumb { aspect-ratio:4/3; overflow:hidden; background:linear-gradient(135deg,#c8963a,#f0d080); display:flex;align-items:center;justify-content:center;font-size:44px; }
  .shop-thumb img { width:100%;height:100%;object-fit:cover; }
  .shop-body { padding:14px; }
  .shop-name { font-size:14px;font-weight:700;color:#1a2a1a;margin-bottom:4px; }
  .shop-desc { font-size:11px;color:#666;line-height:1.6; }
  .shop-tag  { display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 9px;border-radius:3px;background:rgba(200,150,58,.15);color:#c8963a;margin-top:6px; }
  @media(max-width:600px){#shop-grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body class="subpage">

<header id="site-header"></header>
<div id="mobile-menu"></div>

<div class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-title-en">SHOP</h1>
    <p class="page-title-ja"> \ 出店情報 / </p>
  </div>
</div>

<section class="glass-section">
  <div class="container">
    <p class="section-label reveal">Shop</p>
    <h2 class="section-title reveal">出店<em>情報</em></h2>
    <div class="reveal" id="shop-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px;"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<button id="back-to-top" title="ページトップへ">↑</button>

<script src="../js/data.js"></script>
<script src="../js/common.js"></script>
<script>document.addEventListener('DOMContentLoaded', function() {
  var sg = document.getElementById('shop-grid');
  var shops = SITE_DATA.shopVendors || [];
  if (sg) {
    sg.innerHTML = shops.length ? shops.map(function(v) {
      var inner = '<div class="shop-thumb">'+(v.photo?'<img src="../'+v.photo+'" alt="'+v.name+'">':'<span>'+v.emoji+'</span>')+'</div>'+
        '<div class="shop-body"><div class="shop-name">'+v.name+'</div><div class="shop-desc">'+v.desc+'</div><span class="shop-tag">'+v.tag+'</span></div>';
      return v.url ? '<a href="'+v.url+'" target="_blank" rel="noopener" class="shop-card">'+inner+'</a>' : '<div class="shop-card">'+inner+'</div>';
    }).join('') :
    '<div class="coming-soon" style="grid-column:1/-1"><span class="coming-soon-icon">🏪</span><h3>COMING SOON</h3><p>出店情報は決まり次第公開します。</p></div>';
  }
});</script>
</body>
</html>
